inherit: config/default.yaml

# Override for NeRF training
training:
  num_epochs: 30000
  batch_size: 8192
  lr_base: 1e-2
  lr_schedule: "cosine"
  beta: 0.9
  grad_clip: 1.0
  warmup_steps: 1000

model:
  hash_encoder:
    num_levels: 16
    min_resolution: 16
    max_resolution: 2048
    feature_dim: 2
    hash_table_size: 2**19
  mlp:
    hidden_dim: 64
    num_layers: 2
    activation: "relu"

data:
  root_dir: "./data"
  image_downscale: 1
  train_views: 0.8

rendering:
  n_samples: 128
  chunk_size: 32768

output:
  checkpoint: "./experiments/checkpoints/nerf_model.pth"